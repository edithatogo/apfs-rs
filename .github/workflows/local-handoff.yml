name: local-handoff

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cargoless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'
      - run: python3 -m pip install -r requirements-dev.txt
      - run: python3 -m py_compile tools/*.py
      - run: python3 tools/precompile_static_check.py
      - run: python3 tools/config_sanity_check.py
      - run: python3 tools/version_consistency_check.py
      - run: python3 tools/profiling_budget_check.py
      - run: python3 tools/profiling_plan_audit.py
      - run: python3 tools/benchmark_regression_audit.py
      - run: python3 tools/release_automation_audit.py
      - run: python3 tools/bleeding_edge_repo_audit.py
      - run: python3 tools/handoff_status.py --write
      - run: python3 tools/repo_manifest.py --write
      - run: python3 tools/known_risk_check.py
      - run: python3 tools/local_env_doctor.py --json target/local-env-doctor.json || true
