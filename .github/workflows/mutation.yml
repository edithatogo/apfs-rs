
name: mutation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read

jobs:
  cargo-mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,nextest
      - run: cargo mutants --workspace --timeout 300 --output target/mutants
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-mutants-report
          path: target/mutants
