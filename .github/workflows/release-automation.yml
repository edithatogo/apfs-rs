name: release-automation

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release-plan:
    runs-on: ubuntu-latest
    env:
      GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo run -p xtask -- release-automation-audit
      - run: cargo install cargo-dist --version 0.29.0 --locked
      - run: cargo install release-plz --locked
      - run: dist plan --allow-dirty
      - run: release-plz release --dry-run --allow-dirty --config release-plz.toml
