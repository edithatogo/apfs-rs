name: provenance-verify

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  provenance-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: mkdir -p target/provenance && echo apfs-rs-provenance-dry-run > target/provenance/subject.txt
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: target/provenance/subject.txt
