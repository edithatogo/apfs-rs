name: strict-quality

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov,cargo-deny,cargo-audit,cargo-mutants
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace --all-features
      - run: cargo llvm-cov nextest --workspace --all-features --fail-under-lines 90
      - run: cargo deny check
      - run: cargo audit
      - run: cargo mutants --workspace --timeout 60 --minimum-test-timeout 20

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run object_header -- -max_total_time=60
      - run: cargo fuzz run nx_superblock -- -max_total_time=60

  miri-kani-profile-scaffold:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo +nightly miri test -p apfs-types -p apfs-core
      - run: echo "Kani/profiling are local/release gates; install cargo-kani and benchmark tools before enforcing."
