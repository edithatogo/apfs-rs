name: strict-quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy --component llvm-tools-preview
      - run: rustup default stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6
        with:
          tool: nextest,cargo-llvm-cov,cargo-deny,cargo-audit,cargo-mutants
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace --all-features
      - run: cargo llvm-cov nextest --workspace --all-features --fail-under-lines 90
      - run: cargo deny check
      - run: cargo audit
      - run: cargo mutants --workspace --timeout 60 --minimum-test-timeout 20

  fuzz-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install nightly --profile minimal
      - run: rustup default nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run object_header -- -max_total_time=60
      - run: cargo fuzz run nx_superblock -- -max_total_time=60

  miri-kani-profile-scaffold:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install nightly --profile minimal --component miri
      - run: cargo +nightly miri test -p apfs-types -p apfs-core
      - run: echo "Kani/profiling are local/release gates; install cargo-kani and benchmark tools before enforcing."
