name: quality-gates

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace --all-features
      - name: Enforce >= 90% line coverage
        run: cargo llvm-cov nextest --workspace --all-features --fail-under-lines 90 --summary-only

  property-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p apfs-types --test property_nx_superblock
      - run: cargo test -p apfs-core --test integration_inspect
      - run: cargo test -p apfs-cli --test e2e_cli

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run object_header -- -max_total_time=30
      - run: cargo fuzz run nx_superblock -- -max_total_time=30

  mutation:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-mutants --locked
      - run: cargo mutants --workspace --timeout 60 --no-shuffle
