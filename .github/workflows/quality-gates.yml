name: quality-gates

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - run: rustup default stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6
        with:
          tool: nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace --all-features
      - run: cargo run -p apfs-cli -- version --json

  property-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test -p apfs-types --test property_nx_superblock
      - run: cargo test -p apfs-core --test integration_inspect
      - run: cargo test -p apfs-cli --test e2e_cli

  context-and-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo run -p xtask -- registry-check
      - run: cargo run -p xtask -- safety-check
      - run: cargo run -p xtask -- precompile-check
      - run: cargo run -p xtask -- version-consistency-check
      - run: cargo run -p xtask -- profiling-budget-check
      - run: cargo run -p xtask -- profiling-plan-audit
      - run: cargo run -p xtask -- benchmark-regression-audit
      - run: cargo run -p xtask -- release-automation-audit
      - run: cargo run -p xtask -- bleeding-edge-repo-audit
