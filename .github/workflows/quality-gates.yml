name: quality-gates

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - run: rustup default stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6
        with:
          tool: nextest
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --workspace --all-features

  property-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test -p apfs-types --test property_nx_superblock
      - run: cargo test -p apfs-core --test integration_inspect
      - run: cargo test -p apfs-cli --test e2e_cli

  context-and-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo run -p xtask -- registry-check
      - run: cargo run -p xtask -- safety-check
      - run: cargo run -p xtask -- precompile-check
