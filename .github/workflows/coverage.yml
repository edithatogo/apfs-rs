
name: coverage-90

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest
      - run: cargo llvm-cov nextest --workspace --all-features --fail-under-lines 90 --html --output-dir target/llvm-cov/html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llvm-cov-html
          path: target/llvm-cov/html
