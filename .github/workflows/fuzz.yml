
name: fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz run object_header -- -max_total_time=60
      - run: cargo fuzz run nx_superblock -- -max_total_time=60
