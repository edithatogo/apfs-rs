name: apfs-rs-release-scaffold

on:
  workflow_dispatch:
  push:
    tags:
      - 'apfs-rs-v*'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apfs-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python3 tools/release_preflight.py --write-manifest
      - run: cargo test --workspace
      - run: mkdir -p target/release-evidence && cp SHA256SUMS.txt target/release-evidence/SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: apfs-rs/target/release-evidence/SHA256SUMS.txt
