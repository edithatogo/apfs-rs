name: apfs-rs-release-scaffold

on:
  workflow_dispatch:
  push:
    tags:
      - 'apfs-rs-v*'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - run: rustup default stable
      - run: python3 tools/release_preflight.py --write-manifest
      - run: cargo test --workspace
      - run: mkdir -p target/release-evidence && cp SHA256SUMS.txt target/release-evidence/SHA256SUMS.txt
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: target/release-evidence/SHA256SUMS.txt
